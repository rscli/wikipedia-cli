name: Showcase

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  showcase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      # Search mode
      - name: "--search rust"
        run: ./target/release/wiki --search rust

      - name: "-s programming language"
        run: ./target/release/wiki -s "programming language"

      - name: "--search 人工智能"
        run: ./target/release/wiki --search 人工智能

      - name: "--search プログラミング"
        run: ./target/release/wiki --search プログラミング

      # JSON mode
      - name: "--json rust"
        run: ./target/release/wiki --json rust

      - name: "-s -j rust (search + json)"
        run: ./target/release/wiki -s -j rust

      - name: "-j -l zh rust (json + lang)"
        run: ./target/release/wiki -j -l zh rust

      # Flags
      - name: "-h (help)"
        run: ./target/release/wiki -h

      - name: "-V (version)"
        run: ./target/release/wiki -V
