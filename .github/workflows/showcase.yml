name: Showcase

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  showcase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: "wiki rust"
        run: ./target/release/wiki rust

      - name: "wiki \"rust lang\""
        run: ./target/release/wiki "rust lang"

      - name: "wiki Linux"
        run: ./target/release/wiki Linux

      - name: "wiki --json rust"
        run: ./target/release/wiki --json rust

      - name: "wiki -j -l zh rust"
        run: ./target/release/wiki -j -l zh rust

      - name: "wiki -h"
        run: ./target/release/wiki -h

      - name: "wiki -V"
        run: ./target/release/wiki -V
