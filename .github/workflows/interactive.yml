name: Interactive

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  interactive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: "rust (disambiguation)"
        run: ./target/release/wiki rust

      - name: "mercury (disambiguation)"
        run: ./target/release/wiki mercury

      - name: "python (disambiguation)"
        run: ./target/release/wiki python

      - name: "apple (disambiguation)"
        run: ./target/release/wiki apple

      - name: "java (disambiguation)"
        run: ./target/release/wiki java

      - name: "mars (disambiguation)"
        run: ./target/release/wiki mars

      - name: "cargo (disambiguation)"
        run: ./target/release/wiki cargo

      - name: "tiktok"
        run: ./target/release/wiki tiktok

      - name: "cli"
        run: ./target/release/wiki cli

      - name: "Specific: Rust (programming language)"
        run: ./target/release/wiki "Rust (programming language)"
