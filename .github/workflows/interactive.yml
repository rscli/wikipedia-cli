name: Interactive

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  interactive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: "Disambiguate: mercury → select 1st (planet)"
        run: ./target/release/wiki --select 0 mercury

      - name: "Disambiguate: mercury → select 2nd (element)"
        run: ./target/release/wiki --select 1 mercury

      - name: "Disambiguate: mercury → select 3rd (mythology)"
        run: ./target/release/wiki --select 2 mercury

      - name: "Disambiguate: python → select 1st"
        run: ./target/release/wiki --select 0 python

      - name: "Disambiguate: python → select 2nd"
        run: ./target/release/wiki --select 1 python

      - name: "Disambiguate: apple → select 1st"
        run: ./target/release/wiki --select 0 apple

      - name: "Disambiguate: java → select 1st"
        run: ./target/release/wiki --select 0 java

      - name: "Disambiguate: java → select 2nd"
        run: ./target/release/wiki --select 1 java

      - name: "Disambiguate: mars → select 1st"
        run: ./target/release/wiki --select 0 mars

      - name: "Non-interactive fallback (piped)"
        run: ./target/release/wiki rust | head -20

      - name: "Specific: Rust (programming language)"
        run: ./target/release/wiki "Rust (programming language)"
