name: JSON

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: "--json rust"
        run: ./target/release/wiki --json rust

      - name: "--json 大语言模型"
        run: ./target/release/wiki --json 大语言模型

      - name: "--json mercury (disambiguation)"
        run: ./target/release/wiki --json mercury

      - name: "-g -j rust (get + json)"
        run: ./target/release/wiki -g -j rust

      - name: "-g -j -l zh rust (get + json + lang)"
        run: ./target/release/wiki -g -j -l zh rust

      - name: "-s -j rust (search + json)"
        run: ./target/release/wiki -s -j rust

      - name: "-s -j Linux (search + json)"
        run: ./target/release/wiki -s -j Linux

      - name: "-s -j -l ja programming (search + json + lang)"
        run: ./target/release/wiki -s -j -l ja programming

      - name: "-s -j 인공지능 (search + json, Korean)"
        run: ./target/release/wiki -s -j 인공지능
