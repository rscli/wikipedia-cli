name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-query:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: "Query: English → rust"
        run: ./target/release/wiki rust

      - name: "Query: Simplified Chinese → 大语言模型"
        run: ./target/release/wiki 大语言模型

      - name: "Query: Traditional Chinese → 機器學習"
        run: ./target/release/wiki 機器學習

      - name: "Query: Japanese → プログラミング言語"
        run: ./target/release/wiki プログラミング言語

      - name: "Query: Korean → 인공지능"
        run: ./target/release/wiki 인공지능

      - name: "Query: Arabic → الذكاء_الاصطناعي"
        run: ./target/release/wiki الذكاء_الاصطناعي

      - name: "Query: Russian → Искусственный интеллект"
        run: ./target/release/wiki Искусственный интеллект

      - name: "Query: Hindi → कृत्रिम_बुद्धिमत्ता"
        run: ./target/release/wiki कृत्रिम_बुद्धिमत्ता

      - name: "Query: Thai → ปัญญาประดิษฐ์"
        run: ./target/release/wiki ปัญญาประดิษฐ์

      - name: "Query: Greek → Τεχνητή νοημοσύνη"
        run: ./target/release/wiki Τεχνητή νοημοσύνη

      - name: "Query: Hebrew → בינה מלאכותית"
        run: ./target/release/wiki בינה מלאכותית

      - name: "Query: Specific → Rust (programming language)"
        run: ./target/release/wiki "Rust (programming language)"

      - name: "Query: Disambiguation → mercury"
        run: ./target/release/wiki mercury

      - name: "Query: Emoji 🦀 → Crab"
        run: ./target/release/wiki 🦀

      - name: "Query: Emoji 🐍 → Snake"
        run: ./target/release/wiki 🐍

      - name: "Query: Emoji ☕ → Coffee"
        run: ./target/release/wiki ☕

      - name: "Query: Emoji ⚛ → Atom"
        run: ./target/release/wiki ⚛

      - name: "Query: Emoji ♟ → Chess Pawn"
        run: ./target/release/wiki ♟

      - name: "Query: Symbol ∞ → Infinity"
        run: ./target/release/wiki ∞

      - name: "Query: Symbol π → Pi (Greek)"
        run: ./target/release/wiki π

      - name: "Query: Symbol Ω → Omega (Greek)"
        run: ./target/release/wiki Ω

      - name: "Query: Formula E=mc²"
        run: ./target/release/wiki "E=mc²"

      - name: "Query: Special chars C++"
        run: ./target/release/wiki "C++"

      - name: "Query: -l zh rust (force Chinese)"
        run: ./target/release/wiki -l zh rust

      - name: "Query: -l ja rust (force Japanese)"
        run: ./target/release/wiki -l ja rust

      - name: "Query: Long sentence (English)"
        run: ./target/release/wiki "the history of artificial intelligence"

      - name: "Query: Long sentence (Chinese)"
        run: ./target/release/wiki "量子计算机的工作原理是什么"

      - name: "Query: Long sentence (Japanese)"
        run: ./target/release/wiki "ニューラルネットワークの仕組み"

      # --- Tamil, Bengali, Telugu, Turkish, Vietnamese ---
      - name: "Query: Tamil → செயற்கை நுண்ணறிவு"
        run: ./target/release/wiki செயற்கை நுண்ணறிவு

      - name: "Query: Bengali → কৃত্রিম বুদ্ধিমত্তা"
        run: ./target/release/wiki কৃত্রিম বুদ্ধিমত্তা

      - name: "Query: Telugu → కృత్రిమ మేధస్సు"
        run: ./target/release/wiki కృత్రిమ మేధస్సు

      - name: "Query: Turkish → Yapay zekâ"
        run: ./target/release/wiki "Yapay zekâ"

      - name: "Query: Vietnamese → Trí tuệ nhân tạo"
        run: ./target/release/wiki "Trí tuệ nhân tạo"

      # --- More disambiguation ---
      - name: "Query: Disambiguation → python"
        run: ./target/release/wiki python

      - name: "Query: Disambiguation → apple"
        run: ./target/release/wiki apple

      - name: "Query: Disambiguation → java"
        run: ./target/release/wiki java

      - name: "Query: Disambiguation → mars"
        run: ./target/release/wiki mars

      # --- More emojis ---
      - name: "Query: Emoji 🌍 → Earth"
        run: ./target/release/wiki 🌍

      - name: "Query: Emoji 🔬 → Microscope"
        run: ./target/release/wiki 🔬

      - name: "Query: Emoji 🎵 → Musical Note"
        run: ./target/release/wiki 🎵

      - name: "Query: Emoji 🏀 → Basketball"
        run: ./target/release/wiki 🏀

      - name: "Query: Emoji 🧬 → DNA"
        run: ./target/release/wiki 🧬

      - name: "Query: Emoji 🌋 → Volcano"
        run: ./target/release/wiki 🌋

      # --- More forced language ---
      - name: "Query: -l ko artificial intelligence (force Korean)"
        run: ./target/release/wiki -l ko "artificial intelligence"

      - name: "Query: -l ar computer (force Arabic)"
        run: ./target/release/wiki -l ar computer

      - name: "Query: -l ru mathematics (force Russian)"
        run: ./target/release/wiki -l ru mathematics

      - name: "Query: -l hi internet (force Hindi)"
        run: ./target/release/wiki -l hi internet

      - name: "Query: -l zh-tw rust (force Traditional Chinese)"
        run: ./target/release/wiki -l zh-tw rust

      # --- Flags ---
      - name: "Flag: -h (help)"
        run: ./target/release/wiki -h

      - name: "Flag: -V (version)"
        run: ./target/release/wiki -V

      # --- Famous topics ---
      - name: "Query: Albert Einstein"
        run: ./target/release/wiki "Albert Einstein"

      - name: "Query: Linux"
        run: ./target/release/wiki Linux

      - name: "Query: Tokyo"
        run: ./target/release/wiki Tokyo

      - name: "Query: DNA"
        run: ./target/release/wiki DNA

      - name: "Query: Quantum computing"
        run: ./target/release/wiki "quantum computing"

      - name: "Query: Black hole"
        run: ./target/release/wiki "black hole"
