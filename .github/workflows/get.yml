name: Get

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  get:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: "wiki rust"
        run: ./target/release/wiki rust

      - name: "wiki --get rust"
        run: ./target/release/wiki --get rust

      - name: "wiki Linux"
        run: ./target/release/wiki Linux

      - name: "wiki GitHub"
        run: ./target/release/wiki github

      - name: "wiki Anthropic"
        run: ./target/release/wiki anthropic

      - name: "wiki quantum computing"
        run: ./target/release/wiki "quantum computing"

      - name: "-g -l zh rust"
        run: ./target/release/wiki -g -l zh rust
