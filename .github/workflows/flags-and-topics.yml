name: Flags & Topics

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  flags-and-topics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: "Flag: -h (help)"
        run: ./target/release/wiki -h

      - name: "Flag: -V (version)"
        run: ./target/release/wiki -V

      - name: "Albert Einstein"
        run: ./target/release/wiki "Albert Einstein"

      - name: "Linux"
        run: ./target/release/wiki Linux

      - name: "Tokyo"
        run: ./target/release/wiki Tokyo

      - name: "DNA"
        run: ./target/release/wiki DNA

      - name: "Quantum computing"
        run: ./target/release/wiki "quantum computing"

      - name: "Black hole"
        run: ./target/release/wiki "black hole"

      - name: "Long sentence (English)"
        run: ./target/release/wiki "the history of artificial intelligence"

      - name: "Long sentence (Chinese)"
        run: ./target/release/wiki "量子计算机的工作原理是什么"

      - name: "Long sentence (Japanese)"
        run: ./target/release/wiki "ニューラルネットワークの仕組み"

      # --- Get mode (explicit) ---
      - name: "Get: --get rust"
        run: ./target/release/wiki --get rust

      - name: "Get: -g 大语言模型"
        run: ./target/release/wiki -g 大语言模型

      - name: "Get + JSON: --get --json rust"
        run: ./target/release/wiki --get --json rust

      - name: "Get + JSON + Lang: -g -j -l zh rust"
        run: ./target/release/wiki -g -j -l zh rust

      # --- Search mode ---
      - name: "Search: rust"
        run: ./target/release/wiki --search rust

      - name: "Search: 人工智能"
        run: ./target/release/wiki --search 人工智能

      - name: "Search: programming language"
        run: ./target/release/wiki -s "programming language"

      # --- JSON mode ---
      - name: "JSON: rust"
        run: ./target/release/wiki --json rust

      - name: "JSON: 大语言模型"
        run: ./target/release/wiki --json 大语言模型

      - name: "JSON + Search: rust"
        run: ./target/release/wiki --search --json rust

      - name: "JSON + Search: Linux"
        run: ./target/release/wiki -s -j Linux

      - name: "Search + Lang: -s -l zh rust"
        run: ./target/release/wiki -s -l zh rust

      - name: "Search + JSON + Lang: -s -j -l ja programming"
        run: ./target/release/wiki -s -j -l ja programming

      - name: "JSON: mercury (disambiguation)"
        run: ./target/release/wiki --json mercury

      - name: "Search: プログラミング (Japanese)"
        run: ./target/release/wiki --search プログラミング

      - name: "Search + JSON: 인공지능 (Korean)"
        run: ./target/release/wiki -s -j 인공지능
