name: Flags

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  flags:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: "Flag: -h (help)"
        run: ./target/release/wiki -h

      - name: "Flag: -V (version)"
        run: ./target/release/wiki -V
