name: Force Language

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  force-language:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: "-l zh rust (force Chinese)"
        run: ./target/release/wiki -l zh rust

      - name: "-l ja rust (force Japanese)"
        run: ./target/release/wiki -l ja rust

      - name: "-l ko artificial intelligence (force Korean)"
        run: ./target/release/wiki -l ko "artificial intelligence"

      - name: "-l ar computer (force Arabic)"
        run: ./target/release/wiki -l ar computer

      - name: "-l ru mathematics (force Russian)"
        run: ./target/release/wiki -l ru mathematics

      - name: "-l hi internet (force Hindi)"
        run: ./target/release/wiki -l hi internet

      - name: "-l zh-tw rust (force Traditional Chinese)"
        run: ./target/release/wiki -l zh-tw rust
